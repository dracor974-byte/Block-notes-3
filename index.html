<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Chat Color Live</title>

<style>
body{
  margin:0;
  font-family:Arial;
  color:white;
  background: linear-gradient(-45deg,#0a0a0a,#111,#1a1a1a,#0a0a0a);
  background-size:400% 400%;
  animation: bg 10s ease infinite;
}

@keyframes bg{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

/* LOGIN */
#login{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
}

.card{
  background:#141414;
  padding:12px;
  margin:8px;
  border-radius:12px;
  cursor:pointer;
  width:180px;
  text-align:center;
  transition:0.2s;
}
.card:hover{transform:scale(1.05)}

/* APP */
#app{display:none;padding:12px}

textarea{
  width:100%;
  padding:10px;
  background:#141414;
  color:white;
  border:none;
  border-radius:10px;
}

/* MESSAGE */
.note{
  padding:12px;
  margin:10px 0;
  border-radius:14px;
  animation:pop 0.2s ease;
  box-shadow:0 0 10px rgba(255,255,255,0.05);
}

@keyframes pop{
  from{transform:scale(0.95);opacity:0}
  to{transform:scale(1);opacity:1}
}

/* VOICE BUTTON */
.voice{
  margin-left:8px;
  cursor:pointer;
  border:none;
  background:transparent;
  color:white;
}

/* LOGIN COLORS */
.draco{color:#ff4d4d}
.emer{color:#4ECDC4}
.liam{color:#FFD93D}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h2>Choisis ton perso</h2>

  <div class="card" onclick="login('draco')">🔥 Draco</div>
  <div class="card" onclick="login('emer')">💎 Emer</div>
  <div class="card" onclick="login('liam')">⚡ Liam</div>
</div>

<!-- APP -->
<div id="app">

<h3 id="user"></h3>

<textarea id="text" placeholder="Écris un message..."></textarea>
<button onclick="send()">Envoyer</button>

<div id="notes"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const app = initializeApp({
  databaseURL:"https://block-notes-a-3-default-rtdb.firebaseio.com/"
});

const db = getDatabase(app);
const notesRef = ref(db,"notes");

const USERS={
  draco:{name:"Draco",color:"#ff4d4d"},
  emer:{name:"Emer",color:"#4ECDC4"},
  liam:{name:"Liam",color:"#FFD93D"}
};

let me=null;

/* LOGIN */
window.login=(id)=>{
  me={id,...USERS[id]};

  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";

  document.getElementById("user").innerHTML=
    `<span style="color:${me.color}">${me.name}</span>`;
};

/* SEND */
window.send=()=>{
  let text=document.getElementById("text").value;
  if(!text)return;

  push(notesRef,{
    text,
    name:me.name,
    color:me.color,
    id:me.id,
    time:Date.now()
  });

  document.getElementById("text").value="";
};

/* 🔊 VOICE PLUS HUMAIN */
window.speak=(text,btn)=>{
  window.speechSynthesis.cancel();

  const u=new SpeechSynthesisUtterance(text);
  u.lang="fr-FR";
  u.rate=0.9;
  u.pitch=1.1;

  const voices=speechSynthesis.getVoices();
  const fr=voices.find(v=>v.lang.includes("fr"));

  if(fr)u.voice=fr;

  btn.innerText="⏹";

  u.onend=()=>btn.innerText="🔊";

  speechSynthesis.speak(u);
};

/* CHAT LIVE */
onValue(notesRef,snap=>{
  let data=snap.val();
  let box=document.getElementById("notes");
  box.innerHTML="";

  if(!data)return;

  Object.values(data).reverse().forEach(n=>{

    let div=document.createElement("div");
    div.className="note";

    div.style.background=`linear-gradient(135deg, ${n.color}22, #111)`;
    div.style.border=`1px solid ${n.color}55`;

    div.innerHTML=`
      <b style="color:${n.color};text-shadow:0 0 10px ${n.color}">
        ${n.name}
      </b><br/>

      ${n.text}
      <button class="voice" onclick="speak('${n.text}',this)">🔊</button>
    `;

    box.appendChild(div);
  });
});

</script>
</body>
</html>
