<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Chat Multi Monde</title>

<style>
body{margin:0;font-family:Arial;background:#0A0A0A;color:white}
#login{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh}

.card{background:#141414;padding:12px;margin:8px;border-radius:10px;cursor:pointer;width:180px;text-align:center}

#app{display:none;padding:15px}

button{padding:8px;border:none;border-radius:8px;margin:5px;cursor:pointer}
textarea{width:100%;padding:10px;background:#141414;color:white;border:none;border-radius:10px}

.note{background:#141414;padding:10px;margin:10px 0;border-radius:10px}
.voiceBtn{margin-left:8px}
.roomBar{display:flex;gap:8px;margin-bottom:10px}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h2>Choisis ton perso</h2>
  <div class="card" onclick="login('user1')">🔥 Draco</div>
  <div class="card" onclick="login('user2')">💎 Emer</div>
  <div class="card" onclick="login('user3')">⚡ Liam</div>
</div>

<!-- APP -->
<div id="app">

<h3 id="user"></h3>

<!-- ROOMS -->
<div class="roomBar">
  <button onclick="switchRoom('serie')">🎬 Série</button>
  <button onclick="switchRoom('jeux')">🎮 Jeux</button>
  <button onclick="switchRoom('futur')">🚀 Futur</button>
</div>

<textarea id="text" placeholder="Écris un message..."></textarea>

<button onclick="send()">Envoyer</button>
<button onclick="startVoice()">🎤 Voice</button>

<div id="notes"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const app = initializeApp({
  databaseURL:"https://block-notes-a-3-default-rtdb.firebaseio.com/"
});

const db = getDatabase(app);

const rooms = {
  serie: ref(db,"serie"),
  jeux: ref(db,"jeux"),
  futur: ref(db,"futur")
};

const USERS = {
  user1:{name:"Draco",color:"#FF6B6B"},
  user2:{name:"Emer",color:"#4ECDC4"},
  user3:{name:"Liam",color:"#FFD93D"}
};

let currentUser=null;
let currentRoom="serie";

/* LOGIN */
window.login=(id)=>{
  currentUser={id,...USERS[id]};

  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";

  document.getElementById("user").innerHTML=
    `<span style="color:${currentUser.color}">${currentUser.name}</span>`;

  listenRoom();
};

/* SWITCH ROOM */
window.switchRoom=(room)=>{
  currentRoom=room;
  listenRoom();
};

/* SEND TEXT */
window.send=()=>{
  const text=document.getElementById("text").value;
  if(!text||!currentUser)return;

  push(rooms[currentRoom],{
    text,
    name:currentUser.name,
    color:currentUser.color,
    id:currentUser.id,
    time:Date.now()
  });

  document.getElementById("text").value="";
};

/* 🔊 VOIX TEXTE */
window.speak=(text,btn)=>{
  window.speechSynthesis.cancel();

  const u=new SpeechSynthesisUtterance(text);
  u.lang="fr-FR";
  u.rate=0.92;

  btn.innerText="⏹";

  u.onend=()=>btn.innerText="🔊";

  speechSynthesis.speak(u);
};

/* 🎤 VOICE MESSAGE */
let recorder;
let chunks=[];

window.startVoice=async()=>{
  const stream=await navigator.mediaDevices.getUserMedia({audio:true});

  recorder=new MediaRecorder(stream);
  chunks=[];

  recorder.start();

  recorder.ondataavailable=e=>chunks.push(e.data);

  recorder.onstop=()=>{
    const blob=new Blob(chunks,{type:"audio/webm"});
    const reader=new FileReader();

    reader.readAsDataURL(blob);

    reader.onloadend=()=>{
      push(rooms[currentRoom],{
        voice:reader.result,
        name:currentUser.name,
        color:currentUser.color,
        id:currentUser.id,
        time:Date.now()
      });
    };
  };

  setTimeout(()=>recorder.stop(),5000);
};

/* 🔥 LIVE CHAT */
function listenRoom(){
  onValue(rooms[currentRoom],snap=>{
    const data=snap.val();
    const box=document.getElementById("notes");
    box.innerHTML="";

    if(!data)return;

    Object.entries(data).reverse().forEach(([id,n])=>{

      const div=document.createElement("div");
      div.className="note";

      div.innerHTML=`
        <b style="color:${n.color}">${n.name}</b><br/>

        ${n.text?`
          ${n.text}
          <button class="voiceBtn" onclick="speak('${n.text}',this)">🔊</button>
        `:""}

        ${n.voice?`
          <audio controls src="${n.voice}"></audio>
        `:""}
      `;

      box.appendChild(div);
    });
  });
}

</script>
</body>
</html>
