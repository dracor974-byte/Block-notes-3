<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

/* ================= FIREBASE ================= */
const app = initializeApp({
  databaseURL: "https://block-notes-a-3-default-rtdb.firebaseio.com/"
});

const db = getDatabase(app);
const chatRef = ref(db,"chat");

/* ================= STATE ================= */
let me = null;
let color = "#fff";
let channel = "general";
let imageBase64 = null;
let replyTo = null;
let msgs = [];
let mediaRecorder;
let audioChunks = [];

/* ================= LOGIN ================= */
window.login = function(id,name,col){
  me = name;
  color = col;

  document.getElementById("login").style.display = "none";
  document.getElementById("app").style.display = "flex";

  notify("Connecté : " + name, col);
};

/* ================= CHANNEL ================= */
window.switchChannel = function(name,el){
  channel = name;

  document.querySelectorAll(".channel")
    .forEach(c => c.classList.remove("active"));

  el.classList.add("active");

  render();
};

/* ================= IMAGE ================= */
document.getElementById("img").onchange = function(e){
  const file = e.target.files[0];
  const reader = new FileReader();
  reader.onload = () => imageBase64 = reader.result;
  reader.readAsDataURL(file);
};

/* ================= VOICE RECORD ================= */
window.startVoice = async function(){

  const stream = await navigator.mediaDevices.getUserMedia({audio:true});

  mediaRecorder = new MediaRecorder(stream);
  audioChunks = [];

  mediaRecorder.ondataavailable = e => audioChunks.push(e.data);

  mediaRecorder.onstop = () => {

    const blob = new Blob(audioChunks,{type:"audio/webm"});
    const reader = new FileReader();

    reader.onload = () => {

      push(chatRef,{
        name:me,
        color,
        audio:reader.result,
        channel,
        pinned:false,
        time:Date.now()
      });

    };

    reader.readAsDataURL(blob);
  };

  mediaRecorder.start();
  setTimeout(()=>mediaRecorder.stop(),5000);
};

/* ================= REPLY ================= */
window.reply = function(msg){
  replyTo = { name: msg.name, text: msg.text || "" };
  document.getElementById("text").placeholder =
    "Réponse à " + msg.name;
};

/* ================= PING SYSTEM ================= */
function extractMentions(text){
  return text?.match(/@\w+/g) || [];
}

/* ================= PIN ================= */
window.pinMessage = function(msg){

  push(chatRef,{
    ...msg,
    pinned:true,
    time:Date.now()
  });

  notify("📌 Message épinglé", "#ffd93d");
};

/* ================= SEND ================= */
window.send = function(){

  const text = document.getElementById("text").value;
  if(!text && !imageBase64) return;

  push(chatRef,{
    name:me,
    color,
    text,
    img:imageBase64 || null,
    audio:null,
    channel,
    reply:replyTo,
    mentions:extractMentions(text),
    pinned:false,
    time:Date.now()
  });

  document.getElementById("text").value = "";
  imageBase64 = null;
  replyTo = null;
};

/* ================= NOTIFICATION ================= */
function notify(text,col){

  const d = document.createElement("div");

  d.style = `
    position:fixed;
    top:10px;
    left:50%;
    transform:translateX(-50%);
    background:#111;
    border:1px solid ${col};
    padding:10px 16px;
    border-radius:12px;
    z-index:999;
  `;

  d.innerText = text;

  document.body.appendChild(d);
  setTimeout(()=>d.remove(),3000);
}

/* ================= REALTIME ================= */
onValue(chatRef,(snap)=>{

  const data = snap.val();
  msgs = [];

  for(let id in data){
    msgs.push(data[id]);
  }

  render();
});

/* ================= RENDER ================= */
function render(){

  const box = document.getElementById("messages");
  box.innerHTML = "";

  let filtered = msgs.filter(m => m.channel === channel);

  /* 📌 PIN FIRST */
  const pinned = filtered.filter(m => m.pinned);
  const normal = filtered.filter(m => !m.pinned);

  const finalList = [...pinned,...normal];

  finalList.forEach(m => {

    const isPing = m.mentions?.includes("@" + me);

    const div = document.createElement("div");
    div.className = "msg " + (m.name === me ? "me" : "");
    div.style.borderLeft = "3px solid " + m.color;

    if(m.pinned){
      div.style.boxShadow = "0 0 10px #ffd93d";
    }

    if(isPing){
      div.style.boxShadow = "0 0 10px #ff4d6d";
    }

    div.innerHTML = `
      <b style="color:${m.color}">${m.name}</b>

      ${m.pinned ? `<div style="color:#ffd93d;font-size:11px">📌 PINNED</div>` : ""}

      ${m.reply ? `
        <div style="font-size:11px;color:#888">
          ↳ ${m.reply.name} : ${m.reply.text}
        </div>
      ` : ""}

      <div>${m.text || ""}</div>

      ${m.img ? `<img src="${m.img}">` : ""}

      ${m.audio ? `<audio controls src="${m.audio}"></audio>` : ""}

      <br>

      <button onclick="reply(${JSON.stringify(m).replace(/"/g,'&quot;')})">↩</button>

      <button onclick="pinMessage(${JSON.stringify(m).replace(/"/g,'&quot;')})">📌</button>
    `;

    box.appendChild(div);

    if(isPing){
      notify("📢 Ping reçu", "#ff4d6d");
    }
  });
}

</script>
