<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Omori Chat</title>

<style>

/* 🌈 BACKGROUND GRADIENT (REMPLACE VIDEO) */
body{
  margin:0;
  font-family:Arial;
  color:white;
  height:100vh;
  background: linear-gradient(135deg, #1a0033, #2b004f, #5a0033, #2a0040);
  background-size:400% 400%;
  animation: bg 10s ease infinite;
}

@keyframes bg{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

/* APP */
#app{display:flex;height:100vh}

/* SIDEBAR */
#sidebar{
  width:220px;
  background:rgba(20,10,40,0.7);
  backdrop-filter:blur(10px);
  padding:12px;
  border-right:1px solid #3a1a5a;
}

.channel{
  padding:10px;
  border-radius:10px;
  margin-bottom:8px;
  cursor:pointer;
  background:#1b0f2e;
}

.channel.active{
  background:#7a2cff;
}

/* CHAT */
#chat{flex:1;display:flex;flex-direction:column}

#top{
  height:50px;
  display:flex;
  align-items:center;
  padding:0 15px;
  background:rgba(20,10,40,0.8);
  border-bottom:1px solid #3a1a5a;
}

/* MSG */
#messages{
  flex:1;
  overflow:auto;
  padding:15px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.msg{
  max-width:70%;
  padding:10px;
  border-radius:12px;
  background:#1a0b2e;
  border:1px solid #3a1a5a;
}

.me{
  align-self:flex-end;
  background:linear-gradient(135deg,#7a2cff,#ff2e6f);
}

/* REPLY BOX */
.reply{
  font-size:11px;
  opacity:0.7;
  border-left:2px solid #ff2e6f;
  padding-left:6px;
  margin-bottom:5px;
}

/* INPUT */
#input{
  display:flex;
  padding:10px;
  background:rgba(20,10,40,0.8);
  border-top:1px solid #3a1a5a;
}

textarea{
  flex:1;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#12061f;
  color:white;
}

button{
  margin-left:6px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#7a2cff;
  color:white;
  cursor:pointer;
}

/* LOGIN */
#login{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
}

.card{
  background:#1a0b2e;
  padding:12px;
  margin:8px;
  width:180px;
  text-align:center;
  border-radius:12px;
  cursor:pointer;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h2>Choisis ton profil</h2>
  <div class="card" onclick="setUser('Draco')">Draco</div>
  <div class="card" onclick="setUser('Emer')">Emer</div>
  <div class="card" onclick="setUser('Liam')">Liam</div>
</div>

<!-- APP -->
<div id="app" style="display:none">

<div id="sidebar">
  <div class="channel active">🎬 série</div>
  <div class="channel">🎮 jeux</div>
  <div class="channel">🚀 futur</div>
</div>

<div id="chat">

<div id="top">Chat</div>
<div id="messages"></div>

<div id="input">
  <textarea id="text"></textarea>
  <button onclick="send()">Send</button>
</div>

</div>
</div>

<script>

let me=null;
let messages=[];

/* LOGIN */
window.setUser=(name)=>{
  me=name;
  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="flex";
};

/* SEND */
window.send=()=>{
  let text=document.getElementById("text").value;
  if(!text)return;

  messages.push({
    name:me,
    text,
    reply:window.replyTo || null
  });

  window.replyTo=null;
  document.getElementById("text").value="";
  render();
};

/* REPLY FIX */
window.reply=(text)=>{
  window.replyTo=text;
  document.getElementById("text").placeholder="Replying to: "+text;
};

/* RENDER */
function render(){
  let box=document.getElementById("messages");
  box.innerHTML="";

  messages.forEach(m=>{

    let replyHTML = m.reply
      ? `<div class="reply">↳ ${m.reply}</div>`
      : "";

    let div=document.createElement("div");
    div.className="msg "+(m.name===me?"me":"other");

    div.innerHTML=`
      ${replyHTML}
      <b>${m.name}</b><br>
      ${m.text}
      <br>
      <button onclick="reply('${m.text}')">↩ reply</button>
    `;

    box.appendChild(div);
  });
}

</script>

</body>
</html>
