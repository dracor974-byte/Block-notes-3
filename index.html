<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Chat Worlds</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0A0A0A;
  color:white;
}

/* LOGIN */
#login{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
}

.card{
  background:#141414;
  padding:12px;
  margin:8px;
  border-radius:10px;
  cursor:pointer;
  width:180px;
  text-align:center;
  transition:0.2s;
  pointer-events: auto;
}

.card:hover{
  background:#1f1f1f;
  transform: scale(1.05);
}

/* APP */
#app{display:none;padding:12px}

/* ROOM HEADER */
.roomTitle{
  font-size:22px;
  font-weight:bold;
  margin-bottom:5px;
}

.roomBar{
  display:flex;
  gap:10px;
  overflow-x:auto;
  padding:10px 0;
}

.roomBtn{
  padding:12px 16px;
  border-radius:25px;
  border:none;
  cursor:pointer;
  color:white;
  font-weight:bold;
  white-space:nowrap;
  transition:0.2s;
  transform:scale(1);
}

.roomBtn.active{transform:scale(1.1)}

/* COLORS */
.serie{background:#FF6B6B;}
.jeux{background:#4ECDC4;color:black;}
.futur{background:#FFD93D;color:black;}

/* CHAT */
textarea{
  width:100%;
  padding:10px;
  background:#141414;
  color:white;
  border:none;
  border-radius:10px;
}

button{
  padding:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  margin-top:5px;
}

.note{
  background:#141414;
  padding:10px;
  margin:10px 0;
  border-radius:10px;
}

.voiceBtn{
  margin-left:8px;
}

#voiceHold{
  background:#333;
  color:white;
  padding:12px;
  border-radius:10px;
  text-align:center;
  margin-top:8px;
  user-select:none;
  cursor: pointer;
}

#voiceHold.active{
  background:#4ECDC4;
  color:black;
  transform:scale(1.05);
}

audio{
  width:100%;
  margin-top:8px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h2>Choisis ton perso</h2>
  <div class="card" data-id="user1">🔥 Draco</div>
  <div class="card" data-id="user2">💎 Emer</div>
  <div class="card" data-id="user3">⚡ Liam</div>
</div>

<!-- APP -->
<div id="app">

<div id="user"></div>

<!-- ROOMS TITLE -->
<div class="roomTitle" id="roomTitle">🎬 Série</div>

<div class="roomBar">
  <button class="roomBtn serie active" onclick="switchRoom('serie',this)">🎬 Série</button>
  <button class="roomBtn jeux" onclick="switchRoom('jeux',this)">🎮 Jeux</button>
  <button class="roomBtn futur" onclick="switchRoom('futur',this)">🚀 Futur</button>
</div>

<textarea id="text" placeholder="Écris un message..."></textarea>

<button onclick="send()">Envoyer</button>

<!-- 🎤 HOLD TO RECORD -->
<div id="voiceHold">🎤 Maintenir pour enregistrer vocal</div>

<div id="notes"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const app = initializeApp({
  databaseURL:"https://block-notes-a-3-default-rtdb.firebaseio.com/"
});

const db = getDatabase(app);

const rooms = {
  serie: ref(db,"serie"),
  jeux: ref(db,"jeux"),
  futur: ref(db,"futur")
};

const USERS = {
  user1:{name:"Draco",color:"#FF6B6B"},
  user2:{name:"Emer",color:"#4ECDC4"},
  user3:{name:"Liam",color:"#FFD93D"}
};

let currentUser = null;
let currentRoom = "serie";
let recorder;
let chunks = [];
let audioStream;

// LOGIN - Version fiable
document.querySelectorAll('#login .card').forEach(card => {
  card.addEventListener('click', () => {
    const id = card.getAttribute('data-id');
    login(id);
  });
});

window.login = (id) => {
  currentUser = { id, ...USERS[id] };

  document.getElementById("login").style.display = "none";
  document.getElementById("app").style.display = "block";

  document.getElementById("user").innerHTML = `
    <h3 style="color:${currentUser.color}">
      ${currentUser.name}
    </h3>`;

  listenRoom();
};

/* SWITCH ROOM */
window.switchRoom = (room, btn) => {
  currentRoom = room;

  document.querySelectorAll(".roomBtn").forEach(b => {
    b.classList.remove("active");
  });

  if(btn) btn.classList.add("active");

  const titles = {
    serie: "🎬 Série",
    jeux: "🎮 Jeux",
    futur: "🚀 Futur"
  };

  document.getElementById("roomTitle").innerText = titles[room];
  listenRoom();
};

/* SEND TEXT */
window.send = () => {
  const text = document.getElementById("text").value;
  if(!text || !currentUser) return;

  push(rooms[currentRoom], {
    text,
    name: currentUser.name,
    color: currentUser.color,
    id: currentUser.id,
    time: Date.now()
  });

  document.getElementById("text").value = "";
};

/* VOICE RECORDING */
const holdBtn = document.getElementById("voiceHold");

let recording = false;

holdBtn.addEventListener("mousedown", startRecording);
holdBtn.addEventListener("touchstart", startRecording);

holdBtn.addEventListener("mouseup", stopRecording);
holdBtn.addEventListener("mouseleave", stopRecording);
holdBtn.addEventListener("touchend", stopRecording);

async function startRecording() {
  if (recording || !currentUser) return;

  try {
    recording = true;
    holdBtn.classList.add("active");

    audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    recorder = new MediaRecorder(audioStream);
    chunks = [];

    recorder.ondataavailable = e => chunks.push(e.data);
    recorder.start();
  } catch (err) {
    console.error("Erreur micro :", err);
    alert("Impossible d'accéder au micro");
    recording = false;
    holdBtn.classList.remove("active");
  }
}

function stopRecording() {
  if (!recording || !recorder) return;

  recording = false;
  holdBtn.classList.remove("active");

  recorder.stop();

  recorder.onstop = () => {
    const blob = new Blob(chunks, { type: "audio/webm" });
    const url = URL.createObjectURL(blob);

    // Option : lire directement
    const audio = document.createElement("audio");
    audio.controls = true;
    audio.src = url;
    document.getElementById("notes").appendChild(audio);

    // Tu peux aussi l'envoyer sur Firebase plus tard
    audioStream?.getTracks().forEach(track => track.stop());
  };
}

/* Écoute des messages (à compléter selon tes besoins) */
function listenRoom() {
  // Exemple basique
  onValue(rooms[currentRoom], (snapshot) => {
    const data = snapshot.val();
    // Afficher les messages ici...
    console.log(data);
  });
}

</script>
</body>
</html>
