<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Discord Mini</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f13;
  color:white;
}

/* PAGES */
.page{display:none;height:100vh;}
.active{display:block}

/* LOGIN */
#login{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

.card{
  background:#1c1c24;
  padding:12px;
  margin:8px;
  width:180px;
  text-align:center;
  border-radius:10px;
  cursor:pointer;
}

/* ROOM SELECT */
#rooms{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:10px;
}

.room{
  padding:12px;
  width:200px;
  background:#222;
  border-radius:10px;
  cursor:pointer;
  text-align:center;
}

/* CHAT */
#chat{
  display:flex;
  flex-direction:column;
  height:100vh;
}

#topbar{
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px;
  background:#15151d;
}

.back{
  cursor:pointer;
  font-size:20px;
}

#messages{
  flex:1;
  overflow:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.msg{
  background:#1c1c24;
  padding:10px;
  border-radius:10px;
  max-width:70%;
}

.me{
  align-self:flex-end;
  background:#4ECDC4;
  color:black;
}

.other{
  align-self:flex-start;
}

/* INPUT */
#input{
  display:flex;
  padding:10px;
  background:#15151d;
}

textarea{
  flex:1;
  background:#222;
  border:none;
  color:white;
  padding:8px;
  border-radius:6px;
}

button{
  margin-left:5px;
  background:#4ECDC4;
  border:none;
  padding:8px;
  border-radius:6px;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- PAGE 1 LOGIN -->
<div id="login" class="page active">
  <h2>Qui es-tu ?</h2>
  <div class="card" onclick="setUser('Draco','#ff4d6d')">🔥 Draco</div>
  <div class="card" onclick="setUser('Emer','#4ECDC4')">💎 Emer</div>
  <div class="card" onclick="setUser('Liam','#FFD93D')">⚡ Liam</div>
</div>

<!-- PAGE 2 ROOMS -->
<div id="rooms" class="page">
  <h2>Choisis une discussion</h2>
  <div class="room" onclick="openRoom('serie')">🎬 Série</div>
  <div class="room" onclick="openRoom('jeux')">🎮 Jeux</div>
  <div class="room" onclick="openRoom('futur')">🚀 Futur</div>
</div>

<!-- PAGE 3 CHAT -->
<div id="chat" class="page">

<div id="topbar">
  <div class="back" onclick="goRooms()">⬅</div>
  <div id="title">Chat</div>
</div>

<div id="messages"></div>

<div id="input">
  <textarea id="text"></textarea>
  <button onclick="send()">Envoyer</button>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const app = initializeApp({
  databaseURL:"https://block-notes-a-3-default-rtdb.firebaseio.com/"
});

const db = getDatabase(app);

const rooms={
  serie:ref(db,"serie"),
  jeux:ref(db,"jeux"),
  futur:ref(db,"futur")
};

let me=null;
let currentRoom=null;

/* USER */
window.setUser=(name,color)=>{
  me={name,color};
  show("rooms");
};

/* ROOM */
window.openRoom=(r)=>{
  currentRoom=r;
  document.getElementById("title").innerText=r;
  show("chat");
  listen();
};

window.goRooms=()=>{
  show("rooms");
};

/* SHOW PAGE */
function show(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* SEND */
window.send=()=>{
  let text=document.getElementById("text").value;
  if(!text)return;

  push(rooms[currentRoom],{
    text,
    name:me.name,
    color:me.color,
    time:Date.now()
  });

  document.getElementById("text").value="";
};

/* CHAT */
function listen(){
  onValue(rooms[currentRoom],snap=>{
    let data=snap.val();
    let box=document.getElementById("messages");
    box.innerHTML="";

    if(!data)return;

    Object.values(data).forEach(m=>{

      let div=document.createElement("div");

      const isMe = m.name === me.name;

      div.className="msg "+(isMe?"me":"other");

      div.style.border=`1px solid ${m.color}`;

      div.innerHTML=`
        <b style="color:${m.color}">${m.name}</b><br/>
        ${m.text}
      `;

      box.appendChild(div);
    });
  });
}

</script>

</body>
</html>
