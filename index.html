<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Chat Rooms Color</title>

<style>
body{
  margin:0;
  font-family:Arial;
  color:white;
  min-height:100vh;

  background: linear-gradient(-45deg,#0f0f0f,#1a1a2e,#16213e,#0f0f0f);
  background-size:400% 400%;
  animation: bg 12s ease infinite;
}

@keyframes bg{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

/* LOGIN */
#login{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
}

.card{
  background:#141414;
  padding:12px;
  margin:8px;
  border-radius:12px;
  cursor:pointer;
  width:180px;
  text-align:center;
}

/* APP */
#app{display:none;padding:12px}

/* ROOMS */
.rooms{
  display:flex;
  gap:10px;
  margin-bottom:10px;
}

.room{
  padding:10px 14px;
  border-radius:999px;
  cursor:pointer;
  border:none;
  font-weight:bold;
  opacity:0.6;
  transition:0.2s;
}

.room.active{
  opacity:1;
  transform:scale(1.05);
}

.serie{background:#ff4d4d}
.jeux{background:#4ECDC4;color:black}
.futur{background:#FFD93D;color:black}

/* INPUT */
textarea{
  width:100%;
  padding:10px;
  background:#141414;
  color:white;
  border:none;
  border-radius:10px;
}

/* CHAT */
#notes{
  display:flex;
  flex-direction:column;
  gap:10px;
  margin-top:10px;
}

.note{
  max-width:75%;
  padding:10px;
  border-radius:14px;
}

.me{align-self:flex-end}
.other{align-self:flex-start}

.name{
  font-weight:bold;
  margin-bottom:4px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h2>Choisis ton perso</h2>
  <div class="card" onclick="login('draco')">🔥 Draco</div>
  <div class="card" onclick="login('emer')">💎 Emer</div>
  <div class="card" onclick="login('liam')">⚡ Liam</div>
</div>

<!-- APP -->
<div id="app">

<h3 id="user"></h3>

<div class="rooms">
  <button class="room serie active" onclick="switchRoom('serie',this)">🎬 Série</button>
  <button class="room jeux" onclick="switchRoom('jeux',this)">🎮 Jeux</button>
  <button class="room futur" onclick="switchRoom('futur',this)">🚀 Futur</button>
</div>

<textarea id="text" placeholder="Écris un message..."></textarea>
<button onclick="send()">Envoyer</button>

<div id="notes"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const app = initializeApp({
  databaseURL:"https://block-notes-a-3-default-rtdb.firebaseio.com/"
});

const db = getDatabase(app);

const rooms={
  serie:ref(db,"serie"),
  jeux:ref(db,"jeux"),
  futur:ref(db,"futur")
};

const USERS={
  draco:{name:"Draco",color:"#ff4d4d"},
  emer:{name:"Emer",color:"#4ECDC4"},
  liam:{name:"Liam",color:"#FFD93D"}
};

let me=null;
let current="serie";

/* LOGIN */
window.login=(id)=>{
  me={id,...USERS[id]};
  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";
  document.getElementById("user").innerHTML=me.name;
  listen();
};

/* SWITCH ROOM */
window.switchRoom=(r,btn)=>{
  current=r;
  document.querySelectorAll(".room").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  listen();
};

/* SEND */
window.send=()=>{
  let text=document.getElementById("text").value;
  if(!text)return;

  push(rooms[current],{
    text,
    name:me.name,
    color:me.color,
    id:me.id,
    time:Date.now()
  });

  document.getElementById("text").value="";
};

/* CHAT */
function listen(){
  onValue(rooms[current],snap=>{
    let data=snap.val();
    let box=document.getElementById("notes");
    box.innerHTML="";

    if(!data)return;

    Object.values(data).reverse().forEach(n=>{

      const isMe = me && n.id === me.id;

      let div=document.createElement("div");

      div.className="note "+(isMe?"me":"other");

      div.style.background=isMe
        ?`linear-gradient(135deg,${n.color},#111)`
        :`linear-gradient(135deg,#222,#111)`;

      div.style.border=`1px solid ${n.color}55`;

      div.innerHTML=`
        <div class="name" style="color:${n.color}">
          ${n.name}
        </div>
        ${n.text}
      `;

      box.appendChild(div);
    });
  });
}

</script>

</body>
</html>
