<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Chat Worlds</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background: radial-gradient(circle at top,#111,#070707);
  color:white;
}

#login{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
}

.card{
  background:#141414;
  padding:12px;
  margin:8px;
  border-radius:10px;
  cursor:pointer;
  width:180px;
  text-align:center;
}

#app{display:none;padding:12px}

/* ROOMS */
.roomTitle{
  font-size:22px;
  font-weight:bold;
  margin-bottom:5px;
}

.roomBar{
  display:flex;
  gap:10px;
  overflow-x:auto;
  padding:10px 0;
}

.roomBtn{
  padding:12px 16px;
  border-radius:25px;
  border:none;
  cursor:pointer;
  color:white;
  font-weight:bold;
  white-space:nowrap;
  transition:0.2s;
}

.roomBtn.active{transform:scale(1.1)}

.serie{background:#FF6B6B;}
.jeux{background:#4ECDC4;color:black;}
.futur{background:#FFD93D;color:black;}

/* CHAT */
textarea{
  width:100%;
  padding:10px;
  background:#141414;
  color:white;
  border:none;
  border-radius:10px;
}

button{
  padding:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  margin-top:5px;
}

/* MESSAGE */
.note{
  background:linear-gradient(145deg,#1a1a1a,#111);
  padding:12px;
  margin:10px 0;
  border-radius:12px;
  border:1px solid #222;
  animation:pop 0.2s ease;
}

@keyframes pop{
  from{transform:scale(0.95);opacity:0}
  to{transform:scale(1);opacity:1}
}

.voiceBtn{margin-left:8px;cursor:pointer}

audio{width:100%;margin-top:8px}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h2>Choisis ton perso</h2>
  <div class="card" onclick="login('user1')">🔥 Draco</div>
  <div class="card" onclick="login('user2')">💎 Emer</div>
  <div class="card" onclick="login('user3')">⚡ Liam</div>
</div>

<!-- APP -->
<div id="app">

<h3 id="user"></h3>

<div class="roomTitle" id="roomTitle">🎬 Série</div>

<div class="roomBar">
  <button class="roomBtn serie active" onclick="switchRoom('serie',this)">🎬 Série</button>
  <button class="roomBtn jeux" onclick="switchRoom('jeux',this)">🎮 Jeux</button>
  <button class="roomBtn futur" onclick="switchRoom('futur',this)">🚀 Futur</button>
</div>

<textarea id="text" placeholder="Écris un message..."></textarea>

<button onclick="send()">Envoyer</button>
<button onclick="startVoice()">🎤 Vocal</button>

<div id="notes"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const app = initializeApp({
  databaseURL:"https://block-notes-a-3-default-rtdb.firebaseio.com/"
});

const db = getDatabase(app);

const rooms = {
  serie: ref(db,"serie"),
  jeux: ref(db,"jeux"),
  futur: ref(db,"futur")
};

const USERS = {
  user1:{name:"Draco",color:"#FF6B6B"},
  user2:{name:"Emer",color:"#4ECDC4"},
  user3:{name:"Liam",color:"#FFD93D"}
};

let currentUser=null;
let currentRoom="serie";
let recorder;
let chunks=[];
let lastNotif=0;

/* 🔔 NOTIF PERMISSION */
function askNotif(){
  if("Notification" in window){
    Notification.requestPermission();
  }
}

function notify(title,body){
  if(Notification.permission!=="granted") return;

  new Notification(title,{
    body,
    icon:"https://emojiapi.dev/api/v1/speech_balloon/64.png"
  });

  if(navigator.vibrate){
    navigator.vibrate(200);
  }
}

/* LOGIN */
window.login=(id)=>{
  currentUser={id,...USERS[id]};

  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";

  document.getElementById("user").innerHTML=
    `<span style="color:${currentUser.color}">${currentUser.name}</span>`;

  askNotif();
  listenRoom();
};

/* SWITCH ROOM */
window.switchRoom=(room,btn)=>{
  currentRoom=room;

  document.querySelectorAll(".roomBtn").forEach(b=>b.classList.remove("active"));
  if(btn) btn.classList.add("active");

  const titles={
    serie:"🎬 Série",
    jeux:"🎮 Jeux",
    futur:"🚀 Futur"
  };

  document.getElementById("roomTitle").innerText=titles[room];

  listenRoom();
};

/* SEND TEXT */
window.send=()=>{
  const text=document.getElementById("text").value;
  if(!text||!currentUser)return;

  push(rooms[currentRoom],{
    text,
    name:currentUser.name,
    color:currentUser.color,
    id:currentUser.id,
    time:Date.now()
  });

  document.getElementById("text").value="";
};

/* 🔊 VOICE TEXT */
window.speak=(text,btn)=>{
  window.speechSynthesis.cancel();

  const u=new SpeechSynthesisUtterance(text);
  u.lang="fr-FR";
  u.rate=0.92;

  btn.innerText="⏹";

  u.onend=()=>btn.innerText="🔊";

  speechSynthesis.speak(u);
};

/* 🎤 VOICE RECORD */
window.startVoice=async()=>{
  const stream=await navigator.mediaDevices.getUserMedia({audio:true});

  recorder=new MediaRecorder(stream);
  chunks=[];

  recorder.start();

  recorder.ondataavailable=e=>chunks.push(e.data);

  recorder.onstop=()=>{
    const blob=new Blob(chunks,{type:"audio/webm"});
    const reader=new FileReader();

    reader.readAsDataURL(blob);

    reader.onloadend=()=>{
      push(rooms[currentRoom],{
        voice:reader.result,
        name:currentUser.name,
        color:currentUser.color,
        id:currentUser.id,
        time:Date.now()
      });
    };
  };

  setTimeout(()=>recorder.stop(),4000);
};

/* 💬 LIVE CHAT + 🔔 NOTIF */
function listenRoom(){
  onValue(rooms[currentRoom],snap=>{
    const data=snap.val();
    const box=document.getElementById("notes");
    box.innerHTML="";

    if(!data)return;

    Object.entries(data).reverse().forEach(([id,n])=>{

      /* 🔔 NOTIF ANTI SPAM */
      const now=Date.now();
      if(
        currentUser &&
        n.id!==currentUser.id &&
        now-lastNotif>2000
      ){
        notify("💬 "+n.name,n.text||"Message vocal");
        lastNotif=now;
      }

      const div=document.createElement("div");
      div.className="note";

      div.innerHTML=`
        <b style="color:${n.color}">${n.name}</b><br/>

        ${n.text?`
          ${n.text}
          <button class="voiceBtn" onclick="speak('${n.text}',this)">🔊</button>
        `:""}

        ${n.voice?`
          <audio controls src="${n.voice}"></audio>
        `:""}
      `;

      box.appendChild(div);
    });
  });
}

</script>
</body>
</html>
