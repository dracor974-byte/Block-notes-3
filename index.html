<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Chat Multijoueur</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#1a0033,#3a005a,#5a0030);
  color:white;
}

/* LOGIN */
#login{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
}

.card{
  background:#1a0b2e;
  padding:16px;
  margin:10px;
  width:220px;
  text-align:center;
  border-radius:10px;
  cursor:pointer;
}

.card:hover{
  background:#7a2cff;
}

/* APP */
#app{
  display:none;
  height:100vh;
  flex-direction:column;
}

#messages{
  flex:1;
  overflow:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.msg{
  background:#1a0b2e;
  padding:10px;
  border-radius:10px;
  max-width:70%;
}

.me{
  background:#7a2cff;
  align-self:flex-end;
}

#input{
  display:flex;
  padding:10px;
  background:#12061f;
}

textarea{
  flex:1;
}
button{
  margin-left:5px;
}

img{
  max-width:180px;
  border-radius:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h2>Choisis ton identité</h2>
  <div class="card" onclick="login('Draco','Draco','#ff4d6d')">Draco</div>
  <div class="card" onclick="login('Emer','Emer','#4ecdc4')">Emer</div>
  <div class="card" onclick="login('Liam','Liam','#ffd93d')">Liam</div>
</div>

<!-- APP -->
<div id="app">

<div id="messages"></div>

<div id="input">
  <textarea id="text"></textarea>
  <button onclick="send()">Send</button>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

/* ================= FIREBASE ================= */
const app = initializeApp({
  databaseURL: "https://block-notes-a-3-default-rtdb.firebaseio.com/"
});

const db = getDatabase(app);
const chatRef = ref(db,"chat");

/* ================= STATE ================= */
let me = null;
let myColor = "#fff";
let msgs = [];

/* ================= LOGIN ================= */
window.login = function(id,name,color){

  me = name;
  myColor = color;

  document.getElementById("login").style.display = "none";
  document.getElementById("app").style.display = "flex";
};

/* ================= SEND ================= */
window.send = function(){

  const text = document.getElementById("text").value;
  if(!text) return;

  push(chatRef,{
    name: me,
    color: myColor,
    text: text,
    time: Date.now()
  });

  document.getElementById("text").value = "";
};

/* ================= REALTIME ================= */
onValue(chatRef,(snap)=>{

  const data = snap.val();
  msgs = [];

  for(let id in data){
    msgs.push(data[id]);
  }

  render();
});

/* ================= RENDER ================= */
function render(){

  const box = document.getElementById("messages");
  box.innerHTML = "";

  msgs.forEach(m => {

    const div = document.createElement("div");
    div.className = "msg " + (m.name === me ? "me" : "");

    div.style.borderLeft = "3px solid " + m.color;

    div.innerHTML = `
      <b style="color:${m.color}">${m.name}</b><br>
      ${m.text}
      <br>
      <button onclick="speak('${m.text}')">🔊</button>
    `;

    box.appendChild(div);
  });
}

/* ================= VOICE ================= */
window.speak = function(text){

  const u = new SpeechSynthesisUtterance(text);
  u.lang = "fr-FR";
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
};

</script>

</body>
</html>
