<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Chat Omori PWA</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#6c4cff">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0b14;
  color:#f3f0ff;
}

#app{
  display:flex;
  height:100vh;
}

/* SIDEBAR */
#sidebar{
  width:220px;
  background:linear-gradient(180deg,#1a1333,#0f0f1a);
  padding:12px;
  display:flex;
  flex-direction:column;
  gap:10px;
  border-right:1px solid #2a1f4a;
}

.title{
  font-weight:bold;
  color:#b69cff;
  margin-bottom:10px;
}

/* CHANNELS */
.channel{
  padding:10px;
  border-radius:10px;
  cursor:pointer;
  background:#1b1630;
  color:#d9d2ff;
  transition:0.2s;
}

.channel:hover{
  background:#2a1f4a;
}

.channel.active{
  background:#6c4cff;
  color:white;
}

/* CHAT */
#chat{
  flex:1;
  display:flex;
  flex-direction:column;
}

#top{
  height:50px;
  background:#1a1333;
  display:flex;
  align-items:center;
  padding:0 15px;
  font-weight:bold;
  border-bottom:1px solid #2a1f4a;
}

/* MESSAGES */
#messages{
  flex:1;
  overflow:auto;
  padding:15px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.msg{
  max-width:70%;
  padding:10px;
  border-radius:12px;
  background:#1a1333;
  border:1px solid #2a1f4a;
}

.me{
  align-self:flex-end;
  background:linear-gradient(135deg,#6c4cff,#9b7bff);
}

.other{
  align-self:flex-start;
}

/* NAME */
.name{
  font-size:12px;
  opacity:0.8;
  margin-bottom:4px;
}

/* INPUT */
#input{
  display:flex;
  padding:10px;
  background:#1a1333;
  border-top:1px solid #2a1f4a;
}

textarea{
  flex:1;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#0f0f1a;
  color:white;
}

button{
  margin-left:8px;
  background:#6c4cff;
  border:none;
  padding:10px;
  border-radius:10px;
  cursor:pointer;
  color:white;
}

/* LOGIN */
#login{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
  background:radial-gradient(circle,#1a1333,#0b0b14);
}

.card{
  background:#1a1333;
  padding:12px;
  margin:8px;
  width:180px;
  text-align:center;
  border-radius:12px;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h2>Choisis ton profil</h2>
  <div class="card" onclick="setUser('Draco','#ff4d6d')">🔥 Draco</div>
  <div class="card" onclick="setUser('Emer','#4ECDC4')">💎 Emer</div>
  <div class="card" onclick="setUser('Liam','#FFD93D')">⚡ Liam</div>
</div>

<!-- APP -->
<div id="app" style="display:none">

<div id="sidebar">
  <div class="title">🌙 Rooms</div>
  <div class="channel active" onclick="switchRoom('serie',this)">🎬 série</div>
  <div class="channel" onclick="switchRoom('jeux',this)">🎮 jeux</div>
  <div class="channel" onclick="switchRoom('futur',this)">🚀 futur</div>
</div>

<div id="chat">

<div id="top"># chat</div>
<div id="messages"></div>

<div id="input">
  <textarea id="text"></textarea>
  <button onclick="send()">Send</button>
</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const app = initializeApp({
  databaseURL:"https://block-notes-a-3-default-rtdb.firebaseio.com/"
});

const db = getDatabase(app);

const rooms={
  serie:ref(db,"serie"),
  jeux:ref(db,"jeux"),
  futur:ref(db,"futur")
};

let me=null;
let current="serie";

/* PWA */
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js");
}

/* LOGIN */
window.setUser=(name,color)=>{
  me={name,color};

  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="flex";

  askNotif();
  listen();
};

/* NOTIFS */
function askNotif(){
  if("Notification" in window && Notification.permission!=="granted"){
    Notification.requestPermission();
  }
}

function notify(name,text){
  const n=document.createElement("div");
  n.style.position="fixed";
  n.style.top="10px";
  n.style.right="10px";
  n.style.background="#1a1333";
  n.style.padding="10px";
  n.style.border="1px solid #6c4cff";
  n.style.borderRadius="10px";
  n.innerHTML=`<b>${name}</b><br>${text}`;
  document.body.appendChild(n);
  setTimeout(()=>n.remove(),4000);

  if(Notification.permission==="granted"){
    new Notification(name,{body:text});
  }
}

/* ROOM */
window.switchRoom=(r,el)=>{
  current=r;
  document.querySelectorAll(".channel").forEach(c=>c.classList.remove("active"));
  el.classList.add("active");
  listen();
};

/* SEND */
window.send=()=>{
  let text=document.getElementById("text").value;
  if(!text || !me)return;

  push(rooms[current],{
    text,
    name:me.name,
    color:me.color,
    time:Date.now()
  });

  document.getElementById("text").value="";
};

/* VOIX */
window.speak=(text,btn)=>{
  window.speechSynthesis.cancel();

  let u=new SpeechSynthesisUtterance(text);
  u.lang="fr-FR";
  u.rate=0.95;

  btn.innerText="⏹";

  u.onend=()=>btn.innerText="🔊";

  speechSynthesis.speak(u);
};

/* CHAT */
function listen(){
  onValue(rooms[current],snap=>{
    let data=snap.val();
    let box=document.getElementById("messages");
    box.innerHTML="";

    if(!data)return;

    Object.values(data).forEach(m=>{

      const isMe = me && m.name===me.name;

      if(!isMe) notify(m.name,m.text);

      let div=document.createElement("div");
      div.className="msg "+(isMe?"me":"other");

      div.innerHTML=`
        <div class="name">${m.name}</div>
        ${m.text}
        <button onclick="speak('${m.text}',this)">🔊</button>
      `;

      box.appendChild(div);
    });
  });
}

</script>

</body>
</html>
