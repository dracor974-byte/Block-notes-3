<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Chat Worlds Pro</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background: linear-gradient(120deg,#0a0a0a,#111,#0a0a0a);
  color:white;
  overflow-x:hidden;
}

/* LOGIN */
#login{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
}

.card{
  background:#141414;
  padding:12px;
  margin:8px;
  border-radius:12px;
  cursor:pointer;
  width:180px;
  text-align:center;
}

/* APP */
#app{display:none;padding:12px}

/* ROOMS */
.roomBar{
  display:flex;
  gap:10px;
  overflow-x:auto;
  padding:10px 0;
}

.roomBtn{
  padding:12px 16px;
  border-radius:999px;
  border:none;
  cursor:pointer;
  font-weight:bold;
  transition:0.2s;
  white-space:nowrap;
  opacity:0.7;
}

.roomBtn.active{
  transform:scale(1.08);
  opacity:1;
}

.serie{background:#ff4d4d;color:white}
.jeux{background:#4ECDC4;color:black}
.futur{background:#FFD93D;color:black}

/* CHAT */
#notes{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.note{
  max-width:80%;
  padding:10px;
  border-radius:14px;
  animation:pop 0.2s ease;
}

@keyframes pop{
  from{transform:scale(0.9);opacity:0}
  to{transform:scale(1);opacity:1}
}

/* BUBBLES */
.me{
  background:#4ECDC4;
  color:black;
  align-self:flex-end;
  border-bottom-right-radius:4px;
}

.other{
  background:#1a1a1a;
  align-self:flex-start;
  border-bottom-left-radius:4px;
}

/* INPUT */
textarea{
  width:100%;
  padding:10px;
  background:#141414;
  color:white;
  border:none;
  border-radius:10px;
}

/* VOICE HOLD */
#hold{
  background:#222;
  padding:12px;
  margin-top:8px;
  border-radius:10px;
  text-align:center;
  user-select:none;
}

#hold.active{
  background:#4ECDC4;
  color:black;
}

/* AUDIO */
audio{
  width:100%;
  margin-top:6px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h2>Choisis ton perso</h2>
  <div class="card" onclick="login('user1')">🔥 Draco</div>
  <div class="card" onclick="login('user2')">💎 Emer</div>
  <div class="card" onclick="login('user3')">⚡ Liam</div>
</div>

<!-- APP -->
<div id="app">

<h3 id="user"></h3>

<div class="roomBar">
  <button class="roomBtn serie active" onclick="switchRoom('serie',this)">🎬 Série</button>
  <button class="roomBtn jeux" onclick="switchRoom('jeux',this)">🎮 Jeux</button>
  <button class="roomBtn futur" onclick="switchRoom('futur',this)">🚀 Futur</button>
</div>

<textarea id="text" placeholder="Écris un message..."></textarea>

<button onclick="send()">Envoyer</button>

<div id="hold">🎤 Appuie pour enregistrer</div>

<div id="notes"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const app = initializeApp({
  databaseURL:"https://block-notes-a-3-default-rtdb.firebaseio.com/"
});

const db = getDatabase(app);

const rooms={
  serie:ref(db,"serie"),
  jeux:ref(db,"jeux"),
  futur:ref(db,"futur")
};

const USERS={
  user1:{name:"Draco",color:"#ff4d4d"},
  user2:{name:"Emer",color:"#4ECDC4"},
  user3:{name:"Liam",color:"#FFD93D"}
};

let me=null;
let room="serie";
let rec,chunks=[];

/* LOGIN */
window.login=(id)=>{
  me={id,...USERS[id]};
  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";
  document.getElementById("user").innerHTML=me.name;
  listen();
};

/* ROOM */
window.switchRoom=(r,b)=>{
  room=r;
  document.querySelectorAll(".roomBtn").forEach(x=>x.classList.remove("active"));
  b.classList.add("active");
  listen();
};

/* SEND */
window.send=()=>{
  let t=document.getElementById("text").value;
  if(!t)return;

  push(rooms[room],{
    text:t,
    name:me.name,
    id:me.id,
    color:me.color,
    time:Date.now()
  });

  document.getElementById("text").value="";
};

/* 🔔 NOTIF CLEAN */
function notify(title,body){
  if(Notification.permission==="granted"){
    new Notification(title,{body});
    navigator.vibrate?.(150);
  }
}

/* 🔊 LISTEN */
function listen(){
  onValue(rooms[room],snap=>{
    let data=snap.val();
    let box=document.getElementById("notes");
    box.innerHTML="";

    if(!data)return;

    Object.values(data).reverse().forEach(n=>{

      const isMe=n.id===me.id;

      if(!isMe && Math.random()<0.3){
        notify("💬 "+n.name,n.text||"🎤 vocal");
      }

      let div=document.createElement("div");
      div.className="note "+(isMe?"me":"other");

      div.innerHTML=`
        <b style="color:${n.color}">${n.name}</b><br/>
        ${n.text||""}
        ${n.voice?`<audio controls src="${n.voice}"></audio>`:""}
      `;

      box.appendChild(div);
    });
  });
}

/* 🎤 HOLD RECORD */
let hold=document.getElementById("hold");

hold.addEventListener("mousedown",start);
hold.addEventListener("mouseup",stop);
hold.addEventListener("touchstart",start);
hold.addEventListener("touchend",stop);

async function start(){
  hold.classList.add("active");

  let stream=await navigator.mediaDevices.getUserMedia({audio:true});
  rec=new MediaRecorder(stream);
  chunks=[];

  rec.start();
  rec.ondataavailable=e=>chunks.push(e.data);
}

function stop(){
  hold.classList.remove("active");
  rec.stop();

  rec.onstop=()=>{
    let blob=new Blob(chunks,{type:"audio/webm"});
    let r=new FileReader();

    r.readAsDataURL(blob);
    r.onloadend=()=>{
      push(rooms[room],{
        voice:r.result,
        name:me.name,
        id:me.id,
        color:me.color,
        time:Date.now()
      });
    };
  };
}

</script>
</body>
</html>
