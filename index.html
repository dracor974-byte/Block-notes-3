<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Chat Fix</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#1a0033,#3a005a,#5a0030);
  color:white;
}

/* LOGIN */
#login{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
}

.card{
  background:#1a0b2e;
  padding:16px;
  margin:10px;
  width:200px;
  text-align:center;
  border-radius:10px;
  cursor:pointer;
}

.card:hover{
  background:#7a2cff;
}

/* APP */
#app{
  display:none;
  height:100vh;
  flex-direction:column;
}

#messages{
  flex:1;
  padding:10px;
  overflow:auto;
}

.msg{
  background:#1a0b2e;
  padding:10px;
  margin:5px;
  border-radius:10px;
  max-width:70%;
}

.me{
  background:#7a2cff;
  align-self:flex-end;
}

#input{
  display:flex;
  padding:10px;
  background:#12061f;
}

textarea{
  flex:1;
}
button{
  margin-left:5px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h2>Choisis ton identité</h2>
  <div class="card" onclick="login('Draco')">Draco</div>
  <div class="card" onclick="login('Emer')">Emer</div>
  <div class="card" onclick="login('Liam')">Liam</div>
</div>

<!-- APP -->
<div id="app">

<div id="messages"></div>

<div id="input">
  <textarea id="text"></textarea>
  <button onclick="send()">Envoyer</button>
</div>

</div>

<script>

/* ===== STATE ===== */
let me = null;
let msgs = [];

/* ===== LOGIN (FIX GARANTI) ===== */
function login(name){

  console.log("LOGIN OK:", name);

  me = name;

  document.getElementById("login").style.display = "none";
  document.getElementById("app").style.display = "flex";
}
window.login = login;

/* ===== SEND ===== */
function send(){

  let text = document.getElementById("text").value;
  if(!text) return;

  msgs.push({
    name: me,
    text: text
  });

  document.getElementById("text").value = "";

  render();
}

/* ===== RENDER ===== */
function render(){

  const box = document.getElementById("messages");
  box.innerHTML = "";

  msgs.forEach(m => {

    const div = document.createElement("div");
    div.className = "msg " + (m.name === me ? "me" : "");

    div.innerHTML = `<b>${m.name}</b><br>${m.text}`;

    box.appendChild(div);
  });
}

</script>

</body>
</html>
