<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Chat App PWA</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4ECDC4">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f13;
  color:white;
}

/* LAYOUT */
#app{
  display:flex;
  height:100vh;
}

/* SIDEBAR */
#sidebar{
  width:180px;
  background:#15151d;
  padding:10px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.room{
  padding:10px;
  background:#222;
  border-radius:8px;
  cursor:pointer;
  text-align:center;
}

.room.active{
  background:#4ECDC4;
  color:black;
}

/* CHAT */
#chat{
  flex:1;
  display:flex;
  flex-direction:column;
}

#top{
  padding:10px;
  background:#15151d;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

#messages{
  flex:1;
  padding:10px;
  overflow:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
}

/* MESSAGE */
.msg{
  padding:10px;
  border-radius:10px;
  max-width:70%;
  word-break:break-word;
}

.me{
  align-self:flex-end;
  background:#4ECDC4;
  color:black;
}

.other{
  align-self:flex-start;
  background:#222;
}

.name{
  font-weight:bold;
}

/* INPUT */
#input{
  display:flex;
  padding:10px;
  background:#15151d;
}

textarea{
  flex:1;
  padding:8px;
  border:none;
  border-radius:6px;
  background:#222;
  color:white;
}

button{
  margin-left:5px;
  background:#4ECDC4;
  border:none;
  padding:8px;
  border-radius:6px;
  cursor:pointer;
}

/* LOGIN */
#login{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
}

.card{
  background:#222;
  padding:10px;
  margin:8px;
  width:160px;
  text-align:center;
  border-radius:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h2>Qui es-tu ?</h2>
  <div class="card" onclick="setUser('Draco','#ff4d6d')">🔥 Draco</div>
  <div class="card" onclick="setUser('Emer','#4ECDC4')">💎 Emer</div>
  <div class="card" onclick="setUser('Liam','#FFD93D')">⚡ Liam</div>
</div>

<!-- APP -->
<div id="app" style="display:none">

<!-- SIDEBAR -->
<div id="sidebar">
  <div class="room active" onclick="switchRoom('serie',this)">🎬 Série</div>
  <div class="room" onclick="switchRoom('jeux',this)">🎮 Jeux</div>
  <div class="room" onclick="switchRoom('futur',this)">🚀 Futur</div>
</div>

<!-- CHAT -->
<div id="chat">

<div id="top">
  <div id="title">Chat</div>
</div>

<div id="messages"></div>

<div id="input">
  <textarea id="text"></textarea>
  <button onclick="send()">Send</button>
</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const app = initializeApp({
  databaseURL:"https://block-notes-a-3-default-rtdb.firebaseio.com/"
});

const db = getDatabase(app);

const rooms={
  serie:ref(db,"serie"),
  jeux:ref(db,"jeux"),
  futur:ref(db,"futur")
};

let me=null;
let current="serie";

/* PWA REGISTER */
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}

/* LOGIN */
window.setUser=(name,color)=>{
  me={name,color};

  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="flex";

  listen();
};

/* SWITCH ROOM */
window.switchRoom=(r,el)=>{
  current=r;
  document.querySelectorAll(".room").forEach(b=>b.classList.remove("active"));
  el.classList.add("active");
  listen();
};

/* SEND */
window.send=()=>{
  let text=document.getElementById("text").value;
  if(!text || !me)return;

  push(rooms[current],{
    text,
    name:me.name,
    color:me.color,
    time:Date.now()
  });

  document.getElementById("text").value="";
};

/* VOIX */
window.speak=(txt,btn)=>{
  window.speechSynthesis.cancel();

  let u=new SpeechSynthesisUtterance(txt);
  u.lang="fr-FR";
  u.rate=0.95;

  btn.innerText="⏹";

  u.onend=()=>btn.innerText="🔊";

  speechSynthesis.speak(u);
};

/* CHAT */
function listen(){
  onValue(rooms[current],snap=>{
    let data=snap.val();
    let box=document.getElementById("messages");
    box.innerHTML="";

    if(!data)return;

    Object.values(data).forEach(m=>{

      const isMe = me && m.name === me.name;

      let div=document.createElement("div");
      div.className="msg "+(isMe?"me":"other");

      div.innerHTML=`
        <div class="name" style="color:${m.color}">
          ${m.name}
        </div>
        ${m.text}
        <button onclick="speak('${m.text}',this)">🔊</button>
      `;

      box.appendChild(div);
    });
  });
}

</script>

</body>
</html>
