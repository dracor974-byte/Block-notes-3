<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Omori Chat Online</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#7a2cff">

<style>
body{
  margin:0;
  font-family:Arial;
  color:white;
  height:100vh;
  background:linear-gradient(135deg,#1a0033,#3a005a,#5a0030);
}

#app{display:flex;height:100vh}

#sidebar{
  width:200px;
  background:#12061f;
  padding:10px;
}

.channel{
  padding:10px;
  margin:6px;
  background:#1d0a2e;
  border-radius:10px;
  cursor:pointer;
}

.channel.active{background:#7a2cff}

#chat{flex:1;display:flex;flex-direction:column}

#messages{
  flex:1;
  overflow:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.msg{
  padding:10px;
  background:#1a0b2e;
  border-radius:10px;
  max-width:70%;
}

.me{align-self:flex-end;background:#7a2cff}

#input{
  display:flex;
  padding:10px;
  background:#12061f;
}

textarea{
  flex:1;
}

button{margin-left:5px}

img,video{max-width:200px;border-radius:10px}

#login{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
}

.card{
  background:#1a0b2e;
  padding:10px;
  margin:5px;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h2>Choisis ton perso</h2>
  <div class="card" onclick="setUser('Draco')">Draco</div>
  <div class="card" onclick="setUser('Emer')">Emer</div>
  <div class="card" onclick="setUser('Liam')">Liam</div>
</div>

<!-- APP -->
<div id="app" style="display:none">

<div id="sidebar">
  <div class="channel active" onclick="switchRoom('serie',this)">Série</div>
  <div class="channel" onclick="switchRoom('jeux',this)">Jeux</div>
  <div class="channel" onclick="switchRoom('futur',this)">Futur</div>
</div>

<div id="chat">

<div id="messages"></div>

<div id="input">
  <textarea id="text"></textarea>
  <input type="file" id="file" hidden>
  <button onclick="document.getElementById('file').click()">📎</button>
  <button onclick="send()">Send</button>
</div>

</div>
</div>

<script type="module">

/* 🔥 FIREBASE */
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getDatabase,
  ref,
  push,
  onValue
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  databaseURL: "YOUR_DB",
  projectId: "YOUR_ID"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const msgRef = ref(db,"messages");

/* DATA */
let me=null;
let current="serie";
let messages=[];

/* LOGIN */
window.setUser=(name)=>{
  me=name;
  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="flex";
};

/* ROOM */
window.switchRoom=(r,el)=>{
  current=r;
  document.querySelectorAll(".channel").forEach(c=>c.classList.remove("active"));
  el.classList.add("active");
  render();
};

/* SEND */
window.send=()=>{
  let text=document.getElementById("text").value;
  if(!text)return;

  push(msgRef,{
    name:me,
    text,
    room:current,
    time:Date.now()
  });

  document.getElementById("text").value="";
};

/* FILE */
document.getElementById("file").onchange=async(e)=>{
  let file=e.target.files[0];
  let reader=new FileReader();

  reader.onload=()=>{
    push(msgRef,{
      name:me,
      text:"",
      img:reader.result,
      room:current,
      time:Date.now()
    });
  };

  reader.readAsDataURL(file);
};

/* RECEIVE */
onValue(msgRef,(snap)=>{
  let data=snap.val();
  messages=[];

  for(let id in data){
    messages.push(data[id]);

    /* 🔔 notif */
    if(Notification.permission==="granted"){
      new Notification("New message",{body:data[id].text||"image"});
    }
  }

  render();
});

/* RENDER */
function render(){
  let box=document.getElementById("messages");
  box.innerHTML="";

  messages.filter(m=>m.room===current)
  .forEach(m=>{

    let div=document.createElement("div");
    div.className="msg "+(m.name===me?"me":"");

    div.innerHTML=`
      <b>${m.name}</b><br>
      ${m.text||""}
      ${m.img?`<img src="${m.img}">`:""}
      <button onclick="speak('${(m.text||"")}')">🔊</button>
    `;

    box.appendChild(div);
  });
}

/* VOICE */
window.speak=(t)=>{
  let u=new SpeechSynthesisUtterance(t);
  u.lang="fr-FR";
  speechSynthesis.speak(u);
};

/* NOTIF */
if(Notification.permission!=="granted"){
  Notification.requestPermission();
}

</script>

</body>
</html>
