<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Chat App</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#5865F2">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#1e1f22;
  color:white;
}

/* LAYOUT */
#app{
  display:flex;
  height:100vh;
}

/* SIDEBAR (Discord style) */
#sidebar{
  width:220px;
  background:#2b2d31;
  padding:10px;
  display:flex;
  flex-direction:column;
  gap:8px;
}

.title{
  font-weight:bold;
  margin-bottom:10px;
  color:#5865F2;
}

/* CHANNELS */
.channel{
  padding:10px;
  border-radius:8px;
  cursor:pointer;
  background:#313338;
  transition:0.2s;
}

.channel:hover{
  background:#3a3c42;
}

.channel.active{
  background:#5865F2;
  color:white;
}

/* CHAT */
#chat{
  flex:1;
  display:flex;
  flex-direction:column;
}

/* TOP BAR */
#top{
  height:50px;
  background:#2b2d31;
  display:flex;
  align-items:center;
  padding:0 15px;
  font-weight:bold;
}

/* MESSAGES */
#messages{
  flex:1;
  overflow:auto;
  padding:15px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

/* MESSAGE STYLE DISCORD */
.msg{
  max-width:70%;
  padding:10px;
  border-radius:10px;
  background:#2b2d31;
  border-left:3px solid #5865F2;
}

.me{
  align-self:flex-end;
  background:#5865F2;
  color:white;
  border-left:none;
}

.other{
  align-self:flex-start;
}

/* NAME */
.name{
  font-size:12px;
  opacity:0.7;
  margin-bottom:3px;
}

/* INPUT */
#input{
  display:flex;
  padding:10px;
  background:#2b2d31;
}

textarea{
  flex:1;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#1e1f22;
  color:white;
}

button{
  margin-left:8px;
  background:#5865F2;
  border:none;
  padding:10px;
  border-radius:8px;
  cursor:pointer;
  color:white;
}

/* LOGIN */
#login{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
}

.card{
  background:#2b2d31;
  padding:12px;
  margin:8px;
  width:180px;
  text-align:center;
  border-radius:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h2>Choisis ton profil</h2>
  <div class="card" onclick="setUser('Draco','#ff4d6d')">🔥 Draco</div>
  <div class="card" onclick="setUser('Emer','#4ECDC4')">💎 Emer</div>
  <div class="card" onclick="setUser('Liam','#FFD93D')">⚡ Liam</div>
</div>

<!-- APP -->
<div id="app" style="display:none">

<!-- SIDEBAR -->
<div id="sidebar">
  <div class="title">💬 Channels</div>

  <div class="channel active" onclick="switchRoom('serie',this)">🎬 série</div>
  <div class="channel" onclick="switchRoom('jeux',this)">🎮 jeux</div>
  <div class="channel" onclick="switchRoom('futur',this)">🚀 futur</div>
</div>

<!-- CHAT -->
<div id="chat">

<div id="top"># chat</div>

<div id="messages"></div>

<div id="input">
  <textarea id="text"></textarea>
  <button onclick="send()">Envoyer</button>
</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const app = initializeApp({
  databaseURL:"https://block-notes-a-3-default-rtdb.firebaseio.com/"
});

const db = getDatabase(app);

const rooms={
  serie:ref(db,"serie"),
  jeux:ref(db,"jeux"),
  futur:ref(db,"futur")
};

let me=null;
let current="serie";

/* PWA */
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js");
}

/* LOGIN */
window.setUser=(name,color)=>{
  me={name,color};

  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="flex";

  listen();
};

/* SWITCH ROOM */
window.switchRoom=(r,el)=>{
  current=r;

  document.querySelectorAll(".channel")
    .forEach(c=>c.classList.remove("active"));

  el.classList.add("active");

  listen();
};

/* SEND */
window.send=()=>{
  let text=document.getElementById("text").value;
  if(!text || !me)return;

  push(rooms[current],{
    text,
    name:me.name,
    color:me.color,
    time:Date.now()
  });

  document.getElementById("text").value="";
};

/* CHAT */
function listen(){
  onValue(rooms[current],snap=>{
    let data=snap.val();
    let box=document.getElementById("messages");
    box.innerHTML="";

    if(!data)return;

    Object.values(data).forEach(m=>{

      const isMe = me && m.name===me.name;

      let div=document.createElement("div");

      div.className="msg "+(isMe?"me":"other");

      div.innerHTML=`
        <div class="name" style="color:${m.color}">
          ${m.name}
        </div>
        ${m.text}
      `;

      box.appendChild(div);
    });
  });
}

</script>

</body>
</html>
