<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bloc-Notes Partagé</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0A0A0A;--surface:#141414;--border:#222;
  --text:#F0EDE6;--muted:#555;
  --u1:#FF6B6B;--u2:#4ECDC4;--u3:#FFD93D;
}
body{background:var(--bg);color:var(--text);font-family:'Space Mono'}

#login{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.login-title{font-family:'Syne';font-size:40px;font-weight:800}
.user-card{background:var(--surface);border:1px solid #222;padding:20px;margin:10px;border-radius:12px;cursor:pointer}

#app{display:none}

header{
  position:sticky;top:0;background:#0A0A0A;
  padding:14px;border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between
}

main{max-width:700px;margin:auto;padding:20px}

.compose textarea{
  width:100%;background:#141414;color:white;
  border:1px solid #222;padding:10px;border-radius:10px
}

button{cursor:pointer}

.note{background:#141414;margin:10px 0;padding:10px;border-radius:10px}
.note img{max-width:100%;border-radius:10px;margin-top:10px}
.voice-btn{margin-left:10px}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-title">📝 Bloc Notes</div>

  <div class="user-card" onclick="login('user1','User 1','#FF6B6B')">User 1</div>
  <div class="user-card" onclick="login('user2','User 2','#4ECDC4')">User 2</div>
  <div class="user-card" onclick="login('user3','User 3','#FFD93D')">User 3</div>
</div>

<!-- APP -->
<div id="app">

<header>
  <div id="user"></div>
  <button onclick="logout()">Changer</button>
</header>

<main>

<div class="compose">
  <textarea id="text" placeholder="Écris une note..."></textarea>
  <button onclick="post()">Envoyer</button>
</div>

<div id="notes"></div>

</main>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const app = initializeApp({
  databaseURL:"https://block-notes-a-3-default-rtdb.firebaseio.com/"
});

const db = getDatabase(app);
const notesRef = ref(db,'notes');

let currentUser = null;
let speakingId = null;
let audio = null;

// LOGIN
window.login=(id,name,color)=>{
  currentUser={id,name,color};
  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";
  document.getElementById("user").innerText=name;
}

window.logout=()=>{
  location.reload();
}

// POST NOTE
window.post=()=>{
  const text=document.getElementById("text").value;
  if(!text)return;

  push(notesRef,{
    text,
    author:currentUser.name,
    id:currentUser.id,
    color:currentUser.color,
    time:Date.now()
  });

  document.getElementById("text").value="";
}

// NOTIFICATIONS
function notify(note){
  if(note.id===currentUser.id)return;

  new Notification("📝 "+note.author,{
    body:note.text?.slice(0,100)||"Image",
    icon:"https://emojiapi.dev/api/v1/memo/64.png",
    vibrate:[200,100,200]
  });
}

// VOIX IA ELEVENLABS
window.speak=async function(id,text,btn){

  if(speakingId===id){
    audio.pause();
    speakingId=null;
    btn.innerText="🔊";
    return;
  }

  try{
    speakingId=id;
    btn.innerText="⏹";

    const res=await fetch(
      "https://api.elevenlabs.io/v1/text-to-speech/EXAVITQu4vr4xnSDxMaL",
      {
        method:"POST",
        headers:{
          "Content-Type":"application/json",
          "xi-api-key":"TA_CLE_API"
        },
        body:JSON.stringify({
          text,
          model_id:"eleven_multilingual_v2"
        })
      }
    );

    const blob=await res.blob();
    const url=URL.createObjectURL(blob);

    audio=new Audio(url);
    audio.play();

    audio.onended=()=>{
      speakingId=null;
      btn.innerText="🔊";
    }

  }catch(e){
    alert("Erreur voix IA");
    speakingId=null;
  }
}

// DISPLAY NOTES
onValue(notesRef,(snap)=>{

  const data=snap.val();
  const div=document.getElementById("notes");
  div.innerHTML="";

  if(!data)return;

  Object.entries(data).reverse().forEach(([id,n])=>{

    notify(n);

    const el=document.createElement("div");
    el.className="note";

    el.innerHTML=`
      <b style="color:${n.color}">${n.author}</b><br/>
      ${n.text}

      <button class="voice-btn"
        onclick="speak('${id}','${n.text}',this)">
        🔊
      </button>
    `;

    div.appendChild(el);
  });

});

</script>
</body>
</html>
