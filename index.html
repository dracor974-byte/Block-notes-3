<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bloc Notes Live</title>

<style>
body{margin:0;font-family:Arial;background:#0A0A0A;color:white}

#login{
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  height:100vh
}

.card{
  background:#141414;
  padding:15px;margin:10px;
  border-radius:10px;
  cursor:pointer;width:200px;
  text-align:center
}

#app{display:none;padding:20px}

textarea{
  width:100%;padding:10px;
  margin:10px 0;
  background:#141414;
  color:white;
  border:none;
  border-radius:10px
}

button{
  padding:10px;
  border:none;
  border-radius:8px;
  cursor:pointer
}

.note{
  background:#141414;
  padding:10px;
  margin:10px 0;
  border-radius:10px
}

.voice{margin-left:10px;cursor:pointer}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h2>Choisis ton perso</h2>

  <div class="card" onclick="login('user1')">🔥 Draco</div>
  <div class="card" onclick="login('user2')">💎 Emer</div>
  <div class="card" onclick="login('user3')">⚡ Liam</div>
</div>

<!-- APP -->
<div id="app">

<h3 id="user"></h3>

<textarea id="text" placeholder="Écris un message..."></textarea>
<button onclick="send()">Envoyer</button>

<div id="notes"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const app = initializeApp({
  databaseURL:"https://block-notes-a-3-default-rtdb.firebaseio.com/"
});

const db = getDatabase(app);
const notesRef = ref(db,'notes');

const USERS = {
  user1:{name:"Draco",color:"#FF6B6B"},
  user2:{name:"Emer",color:"#4ECDC4"},
  user3:{name:"Liam",color:"#FFD93D"}
};

let currentUser=null;

/* 🔔 NOTIF PERMISSION */
async function askNotifPermission(){
  if ("Notification" in window && Notification.permission === "default") {
    await Notification.requestPermission();
  }
}

/* LOGIN */
window.login=(id)=>{
  currentUser={id,...USERS[id]};
  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";

  document.getElementById("user").innerHTML=
    `<span style="color:${currentUser.color}">${currentUser.name}</span>`;

  askNotifPermission();
}

/* SEND MESSAGE */
window.send=()=>{
  const text=document.getElementById("text").value;
  if(!text||!currentUser)return;

  push(notesRef,{
    text,
    name:currentUser.name,
    color:currentUser.color,
    id:currentUser.id,
    time:Date.now()
  });

  document.getElementById("text").value="";
}

/* 🔊 VOIX */
window.speak=(text,btn)=>{
  window.speechSynthesis.cancel();

  const u=new SpeechSynthesisUtterance(text);
  u.lang="fr-FR";
  u.rate=1;

  btn.innerText="⏹";

  u.onend=()=>{
    btn.innerText="🔊";
  };

  speechSynthesis.speak(u);
}

/* 💬 LIVE + 🔔 NOTIFS */
onValue(notesRef,(snap)=>{
  const data=snap.val();
  const box=document.getElementById("notes");
  box.innerHTML="";

  if(!data)return;

  Object.entries(data).reverse().forEach(([id,n])=>{

    /* 🔔 NOTIFICATION */
    if(currentUser && n.id !== currentUser.id && Notification.permission==="granted"){
      new Notification("💬 "+n.name,{
        body:n.text || "Message envoyé",
        icon:"https://emojiapi.dev/api/v1/speech_balloon/64.png"
      });
    }

    const div=document.createElement("div");
    div.className="note";

    div.innerHTML=`
      <b style="color:${n.color}">${n.name}</b><br/>
      ${n.text}
      <button class="voice" onclick="speak('${n.text}',this)">🔊</button>
    `;

    box.appendChild(div);
  });
});

</script>

</body>
</html>
